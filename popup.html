<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px; padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 13px; color: #333;
    }
    h3 { font-size: 14px; margin-bottom: 12px; }
    label { display: block; margin-bottom: 4px; font-weight: 500; }
    input[type="number"] {
      width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 14px; outline: none;
    }
    input[type="number"]:focus { border-color: #ff4757; }
    .hint { font-size: 11px; color: #999; margin-top: 4px; }
    .row { margin-bottom: 14px; }
    #save {
      width: 100%; padding: 10px; background: linear-gradient(135deg, #ff4757, #ff6b81);
      color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    #save:hover { opacity: 0.9; }
    #msg { text-align: center; margin-top: 8px; font-size: 12px; color: #2ed573; min-height: 18px; }
  </style>
</head>
<body>
  <h3>📋 小红书笔记一键复制 — 设置</h3>
  <div class="row">
    <label>最大评论获取数量</label>
    <input type="number" id="maxComments" min="10" max="10000" step="10" value="100">
    <div class="hint">默认 100 条，最大 10000 条</div>
  </div>
  <button id="save">保存设置</button>
  <div id="msg"></div>
  <script src="popup.js"></script>
</body>
</html>
